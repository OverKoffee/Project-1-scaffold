<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add New Card</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="addcards.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>New Card</h1>
      <p class="headerSubtitle">Remember to sip that caffeine...</p>

      <!-- initial form to fetch a new word to learn-->
      <div id="fetchcard-form">
        <input
          type="text"
          id="learnword"
          placeholder="Enter a new word to learn..."
        />
        <p>
          <button class="form-btn" id="fetchBtn">Fetch</button>
          <a href="index.html" class="form-btn">Back</a>
        </p>
      </div>

      <!-- this form is hidden until they fetch the new word -->
      <div id="flashcard-form" style="display: none">
        <div class="field-group">
          <label for="frontCard">Front (example sentence)</label>
          <textarea id="frontCard" rows="2"></textarea>
        </div>

        <div class="field-group">
          <label for="backCard">Back (definition)</label>
          <textarea id="backCard" rows="2"></textarea>
        </div>

        <div class="button-group">
          <button class="uniform-btn" id="saveCardBtn">Save Card</button>
          <button class="uniform-btn" id="backCardBtn">Back</button>
        </div>
      </div>
    </div>
  </body>
</html>
